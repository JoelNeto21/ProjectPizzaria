<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/512/3132/3132693.png"
      type="image/png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Pizzaria</title>
  </head>
  <body>
    <div class="main-content">
      <div class="login-container">
        <h2>Login Pizzaria</h2>
        <form onsubmit="validarLogin(); return false;">
          <!-- <label for="usuario"></label><br> -->
          <input
            type="text"
            id="usuario"
            placeholder="Digite seu usuário"
            
          /> <br>
          <!-- <label for="senha"></label><br> -->
          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
            
          /> <br>
          <button type="submit">Entrar</button>
          <div id="msg" class="mensagem hidden"></div>
        </form>
      </div>
    </div>
    <footer class="footer">
      &copy; 2025 Pizzaria<br />
      <small
        ><i><u>Todos os direitos reservados</u></i></small
      >
    </footer>
    <script src="pizzaria.js"></script>
  </body>
</html>
